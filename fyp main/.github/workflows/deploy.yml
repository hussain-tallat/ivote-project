name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "hussaintallat547@gmail.com"
          git config --global user.name "hussain-tallat"
          git remote add hf https://huggingface.co/spaces/hussain-tallat/ivote-ai-fraud || true
          git push --force hf main:main
